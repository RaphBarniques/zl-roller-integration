<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Login</title>
  <style>
    body {
      background: #DDE9EF;
      color:#101014;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: #ffffff;
      padding: 28px;
      border-radius: 12px;
      width: 320px;
      box-shadow: rgba(0, 0, 0, 0.2) 0 1px 3px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #d0d0d0;
      box-sizing: border-box;
    }

    input {
      background: #ececec;
      color: #101014;
    }

    button {
      background: #3994BC;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <form method="POST" action="/dashboard/login">
    <h2>Sync Dashboard</h2>
    <input type="password" name="password" placeholder="Password" autofocus />
    <button type="submit">Login</button>
  </form>
</body>
</html>
